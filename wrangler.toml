name = "genealogy-flow"
pages_build_output_dir = "public"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "genealogy-flow"
database_id = "8c0eda38-4eb8-4c2f-b6c2-dafc96c2c059"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "genealogy-flow"

[vars]
VIP_EMAILS = "ginagregoryburns@gmail.com,mayasylvia.burns@gmail.com,jamil.burns@gmail.com,derrickrburns@gmail.com,derrickburns@gmail.com,derrick.burns@gmail.com,derrick@kindredsearch.com,derrickburns@kindredsearch.com,paigeunterberg@gmail.com,james.raby@gmail.com,f.d.gregory@att.net"
# CLERK_PUBLISHABLE_KEY is configured as a Pages secret; middleware has a
# checked-in fallback because the key is public and must match index.html.

# Cron (02:00 UTC daily) is configured in Cloudflare dashboard after first deploy.
# Secrets (set via: npx wrangler pages secret put <NAME> --project-name genealogy-flow):
#   CLERK_SECRET_KEY
#   CLERK_PUBLISHABLE_KEY
#   ANTHROPIC_API_KEY
#   KEY_ENCRYPTION_SECRET   (32-byte hex, e.g. openssl rand -hex 32)
#   GITHUB_TOKEN            (repo issues write permission for app issue reports)
#   RESEND_API_KEY          (optional, sends tree-share invitations and AI reports)
# Optional vars:
#   GITHUB_REPO             (defaults to derrickburns/genealogy-flow)
#   INVITE_FROM_EMAIL       (defaults to Kindred Flow <onboarding@resend.dev>)
#   NEW_LOGIN_NOTIFY_EMAIL  (defaults to derrick.burns@parthenian.com)
#   APP_ORIGIN              (defaults to https://flow.kindredsearch.com)
